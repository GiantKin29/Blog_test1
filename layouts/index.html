{{ define "main" }}

<!-- ヒーロー -->
<section class="jp-hero">
  <div class="jp-hero-inner">
    <span class="jp-hero-label">金融情報メディア</span>
    <h1 class="jp-hero-title">お金の知識が、<br>未来を変える。</h1>
    <p class="jp-hero-sub">株式投資・FX・経済・資産形成について<br>初心者にもわかりやすく、正確な情報をお届けします</p>
    <a href="{{ "/posts/" | relURL }}" class="jp-hero-btn">記事をすべて見る →</a>
  </div>
</section>

<!-- カテゴリナビ -->
<nav class="jp-cat-nav">
  <a href="{{ "/categories/株式投資/" | relURL }}" class="jp-cat-item jp-cat-stocks">
    <span class="jp-cat-icon">📈</span>
    <span class="jp-cat-label">株式投資</span>
  </a>
  <a href="{{ "/categories/fx/" | relURL }}" class="jp-cat-item jp-cat-fx">
    <span class="jp-cat-icon">💱</span>
    <span class="jp-cat-label">FX・為替</span>
  </a>
  <a href="{{ "/categories/経済ニュース/" | relURL }}" class="jp-cat-item jp-cat-news">
    <span class="jp-cat-icon">📰</span>
    <span class="jp-cat-label">経済ニュース</span>
  </a>
  <a href="{{ "/categories/資産形成/" | relURL }}" class="jp-cat-item jp-cat-asset">
    <span class="jp-cat-icon">🏦</span>
    <span class="jp-cat-label">資産形成</span>
  </a>
</nav>

<!-- メインレイアウト -->
<div class="blog-layout-wrapper">
  <main class="blog-main-content">

    <h2 class="jp-section-title">
      <span class="jp-section-bar"></span>新着記事
    </h2>

    <div class="jp-card-grid">
      {{ range (where .Site.RegularPages "Type" "posts") }}
        {{ partial "article-card.html" . }}
      {{ end }}
    </div>

  </main>
  {{ partial "sidebar.html" . }}
</div>

{{ end }}
